; config.ini
; External configuration file for bonds_ytm_withlogs_optimized.lua

[Core]
; Core settings
firmID = 0000
accounts = LWY, UGC ; Comma-separated list

[BondCalculation]
; Bond calculation constants
cb = 16
ruon = 16.1

[Filters]
; Filter thresholds
maxBidPrice = 102.75
minOffers = 1
minDuration = 0
maxDuration = 10000
minNum2Mate = 100
maxNum2Mate = 10000
minNumYTF = 16
maxNumYTF = 32
minShareproc = 0
maxShareproc = 3
minNumYYCpn = 18
maxNumYYCpn = 1000
minNumPL = -1000
maxNumPL = 1000
minNumVol = 0
maxNumVol = 99999999

; String filters - comma-separated lists  /flt,
excludeSNameStrings = Лиз, BCS, деньг, МФК, ВЭББНКР, самолет, апри, ржд, систем, гтлк, сегеж, росагрл, ЛТрейд, Аэрфью, уралкуз, рестор
includeSNameStrings = 
excludeCommentStrings = /D, /TD, Лиз, МФК, факторинг, долг, риск, коллект, застр
includeCommentStrings = 
excludeCurrencyStrings = 
includeCurrencyStrings = SUR, RUR


[SecurityClasses]
; Comma-separated list of security classes to scan
classes = TQOY,TQOE,TQOD,TQOB,TQIR,TQCB,SPBRUBND,SPBBND,TQRD

[FallbackParams]
; Comma-separated list of fallback parameters for price data
params = PREVPRICE,WAPRICE,LCLOSEPRICE,LCURRENTPRICE

[Calculations]
; Calculation defaults
defaultPeriod = 365
defaultNominal = 1000

; [PeriodOverrides] - This section is handled differently in the script itself
; [YYCpnOverrides] - This section is handled differently in the script itself

[General]
export_results = 1
updateIntervalMinutes = 2